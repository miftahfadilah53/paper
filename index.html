<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Notebook Interaktif</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="header-panel">
      <div id="panel-title">Buku Catatan 3D</div>
      <div id="panel-desc">
        <div style="padding-top: 10px">
          Eksplorasi interaktif dengan WebGL. Geser untuk memutar kamera ke
          segala arah, dan <b>klik buku</b> untuk membuka atau menutupnya.
        </div>
      </div>
    </div>

    <div id="ui-container">
      <div id="click-hint">
        <span style="font-size: 18px">👆</span> Klik buku untuk membuka
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="main.js"></script>
  </body>
</html>
