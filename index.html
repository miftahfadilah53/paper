<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Notebook Interaktif</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #eef2f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      canvas {
        display: block;
      }

      .header-panel {
        position: absolute;
        top: 30px;
        left: 30px;
        max-width: 340px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 16px;
        padding: 24px;
        pointer-events: auto;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        z-index: 10;
      }

      #panel-title {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .info-icon {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 18px;
        height: 18px;
        background-color: #94a3b8;
        color: white;
        border-radius: 50%;
        font-size: 11px;
      }

      #panel-desc {
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
        color: #475569;
        overflow: hidden;
        height: 0;
        opacity: 0;
      }

      #ui-container {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 10;
      }

      #click-hint {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #334155;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: 500;
        font-size: 14px;
        display: none;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      @media (max-width: 600px) {
        .header-panel {
          top: 20px;
          left: 20px;
          right: 20px;
          max-width: none;
          padding: 18px;
        }
        #panel-title {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-panel">
      <div id="panel-title">
        Buku Catatan 3D <span class="info-icon">i</span>
      </div>
      <div id="panel-desc">
        <div style="padding-top: 10px">
          Eksplorasi interaktif dengan WebGL. Geser untuk memutar kamera ke
          segala arah, dan <b>klik buku</b> untuk membuka atau menutupnya.
        </div>
      </div>
    </div>

    <div id="ui-container">
      <div id="click-hint">
        <span style="font-size: 18px">👆</span> Klik buku untuk membuka
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
      const getCameraZ = () => (window.innerWidth <= 600 ? 6 : 5);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0, getCameraZ());

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputEncoding = THREE.sRGBEncoding;
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 5, 5);
      scene.add(dirLight);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 2;
      controls.maxDistance = 10;

      let tulangKiri = null;
      let modelBuku = null;
      let isBookOpen = false;
      let hideDescTimer;

      const panelTitle = document.getElementById("panel-title");
      const panelDesc = document.getElementById("panel-desc");
      const clickHint = document.getElementById("click-hint");


      function toggleDescription(show = true) {
        clearTimeout(hideDescTimer);

        if (show) {
          gsap.to(panelDesc, {
            height: "auto",
            opacity: 1,
            duration: 0.5,
            ease: "back.out(1.2)",
          });

          hideDescTimer = setTimeout(() => toggleDescription(false), 4000);
        } else {
          gsap.to(panelDesc, {
            height: 0,
            opacity: 0,
            duration: 0.5,
            ease: "power2.inOut",
          });
        }
      }

      panelTitle.addEventListener("click", () => toggleDescription(true));


      const loader = new THREE.GLTFLoader();
      loader.load("/assets/paperex.glb", function (gltf) {
        modelBuku = gltf.scene;
        scene.add(modelBuku);

        tulangKiri =
          modelBuku.getObjectByName("bone002") ||
          modelBuku.getObjectByName("Bone002");
        if (tulangKiri) {
          tulangKiri.rotation.y = Math.PI * 0.95;
        }

        modelBuku.position.set(-1, -3, -1);
        modelBuku.rotation.set(Math.PI / 4, 0, 0);

        gsap.to(modelBuku.position, {
          x: -1,
          y: 0,
          z: 0,
          duration: 1.5,
          ease: "power2.out",
        });
        gsap.to(modelBuku.rotation, {
          x: Math.PI / 2,
          duration: 1.5,
          ease: "power2.out",
          onComplete: () => {
            clickHint.style.display = "inline-flex";
            gsap.to(clickHint, { opacity: 1, duration: 0.5 });
            toggleDescription(true);
          },
        });
      });


      let startPoint = { x: 0, y: 0 };
      window.addEventListener("pointerdown", (e) => {
        startPoint.x = e.clientX;
        startPoint.y = e.clientY;
      });

      window.addEventListener("pointerup", (e) => {
        const dist = Math.hypot(
          e.clientX - startPoint.x,
          e.clientY - startPoint.y,
        );
        if (dist > 10 || !modelBuku || !tulangKiri) return;

        const mouse = new THREE.Vector2(
          (e.clientX / window.innerWidth) * 2 - 1,
          -(e.clientY / window.innerHeight) * 2 + 1,
        );

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(modelBuku, true);

        if (intersects.length > 0) {
          isBookOpen = !isBookOpen;


          gsap.to(tulangKiri.rotation, {
            y: isBookOpen ? 0 : Math.PI * 0.95,
            duration: 1.2,
            ease: "expo.out",
          });


          gsap.to(modelBuku.position, {
            x: isBookOpen ? 0 : -1,
            duration: 1.2,
            ease: "expo.out",
          });


          const currentZ = getCameraZ();
          const targetZ = isBookOpen ? currentZ + 3.5 : currentZ;

          gsap.to(camera.position, {
            x: 0,
            y: 0,
            z: targetZ,
            duration: 1.5,
            ease: "expo.out",
          });


          gsap.to(controls.target, {
            x: 0,
            y: 0,
            z: 0,
            duration: 1.5,
            ease: "expo.out",
          });

          clickHint.innerHTML = isBookOpen
            ? 'Klik buku untuk menutup <span style="font-size: 18px;">👉</span>'
            : '<span style="font-size: 18px;">👆</span> Klik buku untuk membuka';
        }
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
